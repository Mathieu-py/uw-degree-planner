name: Refresh UWFlow data

# Re-fetches the active term's course snapshot from UWFlow and opens a PR with
# any diff in data/*.json. Ratings and (especially) section enrollment counts
# drift over time, so a daily refresh keeps the committed snapshot within ~24h
# of truth. The active term is whatever scripts/fetch-uwflow.ts defaults to,
# i.e. PINNED_TERM in lib/terms.ts — no term config lives here.
#
# NOTE: opening the PR requires "Allow GitHub Actions to create and approve pull
# requests" under Settings → Actions → General. If the first run fails at the
# create-pull-request step, enable that setting.

on:
  schedule:
    # 07:00 UTC ≈ 03:00 ET — off-peak for the community-run UWFlow endpoint.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm fetch-courses
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/refresh-uwflow
          delete-branch: true
          add-paths: data/*.json
          commit-message: "chore(data): refresh UWFlow snapshot"
          title: "chore(data): refresh UWFlow snapshot"
          body: |
            Automated daily refresh of the UWFlow course snapshot
            (`data/courses.*.json` + `data/descriptions.*.json`) for the
            pinned term.

            Triggered by the `Refresh UWFlow data` workflow. Re-runs update
            this same branch/PR rather than opening duplicates.
