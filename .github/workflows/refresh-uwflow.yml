name: Refresh UWFlow data

# Re-fetches the active term's course snapshot from UWFlow and opens a PR with
# any diff in data/*.json. Ratings and (especially) section enrollment counts
# drift over time, so a daily refresh keeps the committed snapshot within ~24h
# of truth. The active term is whatever scripts/fetch-uwflow.ts defaults to,
# i.e. PINNED_TERM in lib/terms.ts — no term config lives here.
#
# Commits any diff directly to main using the built-in GITHUB_TOKEN (no PR).
# NOTE: if main has branch protection requiring PRs/reviews, the push will be
# rejected — either exempt github-actions or switch back to a PR step.

on:
  schedule:
    # 07:00 UTC ≈ 03:00 ET — off-peak for the community-run UWFlow endpoint.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm fetch-courses
      - name: Commit refreshed snapshot to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes — UWFlow snapshot is already up to date."
          else
            git commit -m "chore(data): refresh UWFlow snapshot"
            git push
          fi
