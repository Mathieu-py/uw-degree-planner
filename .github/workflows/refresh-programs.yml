name: Refresh program requirements

# Re-scrapes undergraduate degree requirements from UW's calendar pages and opens
# a PR with any diff in data/programs.json. Unlike the UWFlow ratings/seats
# snapshot (which drifts daily), program requirements track the undergraduate
# calendar and change roughly once a year, so a monthly refresh is plenty to
# catch catalog updates and the occasional mid-year correction without spamming
# no-op PRs. The scraped programs are whatever scripts/scrape-programs.ts targets.
#
# Commits any diff directly to main using the built-in GITHUB_TOKEN (no PR).
# NOTE: if main has branch protection requiring PRs/reviews, the push will be
# rejected — either exempt github-actions or switch back to a PR step.

on:
  schedule:
    # 07:00 UTC ≈ 03:00 ET on the 1st of each month — off-peak, monthly cadence.
    - cron: "0 7 1 * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm scrape-programs
      - name: Commit refreshed snapshot to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/programs.json
          if git diff --staged --quiet; then
            echo "No changes — program requirements snapshot is already up to date."
          else
            git commit -m "chore(data): refresh program requirements snapshot"
            git push
          fi
